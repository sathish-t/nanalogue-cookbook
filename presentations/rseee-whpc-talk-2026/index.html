## Nanalogue-chat or how I developed an agent around my package using LLMs

Talk to your genomics data in plain English!

Sathish Thiyagarajan

Nieduszynski group at the Earlham Institute

---

## LLMs impact on analysis

- Lowers skill barrier to writing code
- 'Unprepared' users manually approve code
- Privacy, safety, security compromised due to this

---

## Chat workflow

![Chat workflow](images/chat_workflow.png)

---

## Monty: an innovative Python interpreter

- https://github.com/pydantic/monty
- Can be accessed as a library
- Written for running untrusted LLM-made code
    - No imports, no filesystem access, no env vars
    - <font color="blue">User supplies external functions</font>
- Avoids problems like the following

<pre><code data-trim class="language-python">
>>> import dog
>>> dog.woof() # Malicious, `rm -rf *`
</code></pre>

---

## What is Nanalogue-gui?

Sequencing data processing with AI chat features.

- Inspect system prompts and tools in plain English
- Run analyses on text and binary BAM data
- Generate figures quickly

## Thoughts for future

<div class="future-thoughts-body">

For tool builders:
- Build custom functions/tools for LLMs
    - So they access custom data or algorithms
    - This also constrains inexperienced users
- Then, just make a chat interface to the LLM
- Allow bring your own LLM (privacy, interop)
- Automate code generation and safe execution

For tool users:
- More complex stuff doable with no coding!
- Driven to do more and more complex stuff.

</div>
